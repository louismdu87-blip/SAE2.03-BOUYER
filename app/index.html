<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="movie-list-container"></section>

    <script type="module">
      import { DataMovie } from "./data/dataMovie.js";
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movies/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";

      let data = await DataMovie.requestMovies();

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerFilms = function () {
         V.renderMoviesCategory(data);
      };

        C.handlerMovieDetail = async function (id) {
        let selectedMovie= await DataMovie.requestMovieDetails(id);
        if (selectedMovie) {
          V.renderMovieDetail(selectedMovie);
        }
      };



      C.start = function () {
        V.renderNavBar("C.handlerAbout()", "C.handlerFilms()");
        V.renderMovies(data);
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout, hFilms) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hFilms);
      };


      V.renderMovies = function (movies) {
        let content = document.querySelector("#movie-list-container");
        content.innerHTML = Movie.format(movies);
      };

      V.renderMoviesCategory = function (groupedMovies) {
        let content = document.querySelector("#movie-list-container");
        let finalHtml = "";
        for (let categoryName in groupedMovies) {
          let moviesList = groupedMovies[categoryName];
          let moviesHtml = Movie.format(moviesList);
          finalHtml += MovieCategory.format(categoryName, moviesHtml);
        }

        content.innerHTML = finalHtml;
      };

      V.renderMovieDetail = function (data) {
        let content = document.querySelector("#movie-list-container");
        content.innerHTML = MovieDetail.format(data);
      };

      C.start();
    </script>
  </body>
</html>
